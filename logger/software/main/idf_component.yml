## Managed component dependencies for the logger app.
##
## Just the debounced-button component; everything else (TWAI, FAT/SD, timers)
## comes from ESP-IDF itself (see main/CMakeLists.txt PRIV_REQUIRES). The display
## has been removed, so no BSP / LVGL / esp_lcd dependencies.
dependencies:
  idf:
    version: ">=5.2"
  espressif/button: "^4"
